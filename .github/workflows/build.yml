name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip build-essential git zip unzip openjdk-17-jdk

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Clean old build
      run: |
        rm -rf .buildozer
        rm -rf /home/runner/.buildozer

    # 🔥 FORCE SPEC FIX
    - name: Fix buildozer config
      run: |
        sed -i 's/android.api = .*/android.api = 30/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 23b/' buildozer.spec
        sed -i 's/android.ndk_api = .*/android.ndk_api = 21/' buildozer.spec

    - name: Build APK
      run: |
        yes | buildozer android debug
