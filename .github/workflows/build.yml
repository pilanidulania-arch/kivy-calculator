name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Run Buildozer in official Docker (Python 3.11)
      - name: Build APK with Docker
        run: |
          docker run --rm -v $PWD:/home/user/hostcwd -w /home/user/hostcwd kivy/buildozer:python3.11 \
          buildozer android debug
