name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      # 🔥 CLEAN OLD FILES
      - name: Clean
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk build-essential

      - name: Install Python tools
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      # 🔥 IMPORTANT FIX (DISABLE RC DOWNLOAD)
      - name: Set environment variables
        run: |
          echo "BUILDOZER_BUILD_TOOLS_VERSION=33.0.2" >> $GITHUB_ENV
          echo "ANDROIDAPI=33" >> $GITHUB_ENV
          echo "ANDROIDMINAPI=21" >> $GITHUB_ENV

      # 🚀 BUILD DIRECT (let buildozer handle sdk)
      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
