name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      # 🔥 Clean everything
      - name: Clean old builds
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git zip unzip openjdk-17-jdk wget curl

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      # 🚀 IMPORTANT: Pre-create buildozer SDK config
      - name: Force Buildozer SDK config
        run: |
          mkdir -p .buildozer/android/platform
          
          echo "sdk.dir=$HOME/.buildozer/android/platform/android-sdk" > local.properties

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          
          # 🔥 FORCE stable tools INSIDE buildozer
          export BUILDOZER_BUILD_TOOLS_VERSION=33.0.2
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21

          buildozer android debug
