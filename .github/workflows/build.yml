name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip build-essential git zip unzip openjdk-17-jdk wget

    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 🔥 VERY IMPORTANT STEP (RESET EVERYTHING)
    - name: Clean old buildozer SDK
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer
        rm -rf /home/runner/.buildozer

    - name: Build APK (Auto License Fix)
      run: |
        export BUILDOZER_WARN_ON_ROOT=0

        # 🔥 FORCE LICENSE ACCEPT INSIDE BUILDOZER
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg

        yes | buildozer android debug
